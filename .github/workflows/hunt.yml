name: model-hunter

on:
  schedule:
    # Every hour at :07 (past the typical free-tier reset minutes)
    - cron: '7 * * * *'
  workflow_dispatch: {}

jobs:
  hunt:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Restore SQLite DB from cache
        uses: actions/cache@v4
        with:
          path: data/model-hunter.sqlite
          key: model-hunter-db-${{ github.run_id }}
          restore-keys: |
            model-hunter-db-

      - name: Ensure data dir
        run: mkdir -p data

      - name: Build
        run: npm run build

      - name: Seed sources (idempotent)
        run: npm run seed

      - name: Run hunter
        run: npm start
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          MODEL_HUNTER_DB_PATH: ${{ secrets.MODEL_HUNTER_DB_PATH }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          ALERT_EMAIL_TO: ${{ secrets.ALERT_EMAIL_TO }}
          ALERT_EMAIL_FROM: ${{ secrets.ALERT_EMAIL_FROM }}
          OLLAMA_HOST: ${{ secrets.OLLAMA_HOST }}
          OLLAMA_MODEL: ${{ secrets.OLLAMA_MODEL }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          RELEVANCE_THRESHOLD: '65'
          LOG_LEVEL: info

      - name: Save SQLite DB to cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: data/model-hunter.sqlite
          key: model-hunter-db-${{ github.run_id }}

      - name: Upload run log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: model-hunter-log
          path: |
            data/*.sqlite
            *.log
          retention-days: 7
